<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Verifier-grounded multi-agent reasoning pipeline</title>
  <desc id="desc">A paper figure showing how Guandan decision points become LLM reasoning traces, verifier labels, revision feedback, and paired attribution results.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #475569; }
      .box-title { font: 700 21px Arial, Helvetica, sans-serif; fill: #111827; }
      .box-text { font: 400 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .metric { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .blue { fill: #eff6ff; stroke: #2563eb; }
      .teal { fill: #ecfdf5; stroke: #059669; }
      .amber { fill: #fffbeb; stroke: #d97706; }
      .slate { fill: #f8fafc; stroke: #64748b; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
      .pill { rx: 14; ry: 14; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="620" />
  <text x="700" y="48" text-anchor="middle" class="title">Verifier-Grounded Multi-Agent Reasoning Pipeline</text>
  <text x="700" y="78" text-anchor="middle" class="subtitle">Decision-point evaluation for zero-communication mixed-motive Guandan traces</text>

  <g transform="translate(60,125)">
    <rect class="blue pill" width="250" height="270" stroke-width="2.5" />
    <text x="125" y="38" text-anchor="middle" class="box-title">Decision Point</text>
    <line x1="28" y1="58" x2="222" y2="58" class="thin" />
    <text x="30" y="92" class="box-text">Public history</text>
    <text x="30" y="124" class="box-text">Private hand</text>
    <text x="30" y="156" class="box-text">Legal actions</text>
    <text x="30" y="188" class="box-text">Hand counts</text>
    <text x="30" y="220" class="box-text">Scenario tags</text>
    <text x="30" y="252" class="small">Example tags: partner near finish,</text>
    <text x="30" y="274" class="small">opponent near finish, endgame race</text>
  </g>

  <g transform="translate(380,125)">
    <rect class="amber pill" width="250" height="270" stroke-width="2.5" />
    <text x="125" y="38" text-anchor="middle" class="box-title">LLM Trace</text>
    <line x1="28" y1="58" x2="222" y2="58" class="thin" />
    <text x="30" y="92" class="box-text">Selected action</text>
    <text x="30" y="124" class="box-text">Team objective</text>
    <text x="30" y="156" class="box-text">Partner belief</text>
    <text x="30" y="188" class="box-text">Opponent belief</text>
    <text x="30" y="220" class="box-text">Action rationale</text>
    <text x="30" y="252" class="small">Structured output makes reasoning</text>
    <text x="30" y="274" class="small">checkable rather than merely fluent.</text>
  </g>

  <g transform="translate(700,125)">
    <rect class="teal pill" width="270" height="270" stroke-width="2.5" />
    <text x="135" y="38" text-anchor="middle" class="box-title">Rule-Grounded Verifier</text>
    <line x1="28" y1="58" x2="242" y2="58" class="thin" />
    <text x="30" y="92" class="box-text">Legal action</text>
    <text x="30" y="124" class="box-text">Beats table</text>
    <text x="30" y="156" class="box-text">Public-history consistency</text>
    <text x="30" y="188" class="box-text">Hidden-info discipline</text>
    <text x="30" y="220" class="box-text">Reason-action consistency</text>
    <text x="30" y="252" class="small">Hard labels separate rule failures</text>
    <text x="30" y="274" class="small">from soft strategic warnings.</text>
  </g>

  <g transform="translate(1060,125)">
    <rect class="slate pill" width="280" height="270" stroke-width="2.5" />
    <text x="140" y="38" text-anchor="middle" class="box-title">Paired Attribution</text>
    <line x1="28" y1="58" x2="252" y2="58" class="thin" />
    <text x="30" y="96" class="box-text">Candidate parsed traces</text>
    <text x="244" y="96" text-anchor="end" class="metric">32</text>
    <text x="30" y="136" class="box-text">Hard failures</text>
    <text x="244" y="136" text-anchor="end" class="metric">35 to 10</text>
    <text x="30" y="176" class="box-text">Public-history drop</text>
    <text x="244" y="176" text-anchor="end" class="metric">80%</text>
    <text x="30" y="216" class="box-text">Hidden-info drop</text>
    <text x="244" y="216" text-anchor="end" class="metric">20%</text>
    <text x="30" y="254" class="small">Revision subset excludes 18 parse failures.</text>
  </g>

  <path d="M310,260 C342,260 348,260 380,260" class="line" />
  <path d="M630,260 C664,260 666,260 700,260" class="line" />
  <path d="M970,260 C1010,260 1020,260 1060,260" class="line" />

  <g transform="translate(385,455)">
    <rect x="0" y="0" width="235" height="64" rx="14" ry="14" fill="#fff7ed" stroke="#d97706" stroke-width="2" />
    <text x="117.5" y="26" text-anchor="middle" class="box-text">Verifier feedback</text>
    <text x="117.5" y="48" text-anchor="middle" class="small">revises trace, not game state</text>
  </g>
  <path d="M835,395 C835,460 690,488 620,488" class="line" />
  <path d="M385,488 C300,488 255,420 255,395" class="line" />

  <text x="700" y="580" text-anchor="middle" class="small">Figure source: docs/research/experiments/pilot-verifier-attribution/verifier-attribution.json and verifier-result artifacts.</text>
</svg>
