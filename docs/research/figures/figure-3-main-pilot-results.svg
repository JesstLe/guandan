<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="650" viewBox="0 0 1500 650" role="img" aria-labelledby="title desc">
  <title id="title">Main pilot results</title>
  <desc id="desc">Source-backed pilot results showing parse yield, hard verifier failures, and paired hard-failure attribution after verifier revision.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #475569; }
      .panel-title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111827; }
      .axis-label { font: 700 14px Arial, Helvetica, sans-serif; fill: #334155; }
      .tick { font: 400 13px Arial, Helvetica, sans-serif; fill: #64748b; }
      .value { font: 700 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .note { font: 400 15px Arial, Helvetica, sans-serif; fill: #475569; }
      .big { font: 700 42px Arial, Helvetica, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1500" height="650" fill="#ffffff" />
  <text x="750" y="48" text-anchor="middle" class="title">Main Pilot Results: Reliability Is Layered</text>
  <text x="750" y="78" text-anchor="middle" class="subtitle">Parse yield, hard verifier failures, and paired verifier-revision attribution are reported separately</text>

  <rect x="55" y="115" width="785" height="455" class="box" />
  <text x="90" y="150" class="panel-title">A. End-to-end trace reliability by condition</text>
  <line x1="94" y1="425" x2="694" y2="425" stroke="#334155" stroke-width="2" />
  <line x1="94" y1="165" x2="94" y2="425" stroke="#334155" stroke-width="2" />
  <text x="82" y="169" text-anchor="end" class="tick">100%</text>
  <text x="82" y="299" text-anchor="end" class="tick">50%</text>
  <text x="82" y="429" text-anchor="end" class="tick">0%</text>
  <line x1="94" y1="295" x2="694" y2="295" stroke="#e2e8f0" stroke-width="1.5" />
  <g>
      <rect x="94" y="290" width="62" height="135" rx="7" fill="#2563eb" opacity="0.82" />
      <rect x="164" y="232" width="22" height="193" rx="5" fill="#dc2626" opacity="0.78" />
      <text x="125" y="280" text-anchor="middle" class="value">26/50</text>
      <text x="175" y="222" text-anchor="middle" class="value">26</text>
      <text x="135" y="462" text-anchor="middle" class="axis-label">Plain</text>
    </g>
<g>
      <rect x="206" y="259" width="62" height="166" rx="7" fill="#2563eb" opacity="0.82" />
      <rect x="276" y="165" width="22" height="260" rx="5" fill="#dc2626" opacity="0.78" />
      <text x="237" y="249" text-anchor="middle" class="value">32/50</text>
      <text x="287" y="155" text-anchor="middle" class="value">35</text>
      <text x="247" y="462" text-anchor="middle" class="axis-label">Cand.</text>
    </g>
<g>
      <rect x="318" y="238" width="62" height="187" rx="7" fill="#2563eb" opacity="0.82" />
      <rect x="388" y="418" width="22" height="7" rx="5" fill="#dc2626" opacity="0.78" />
      <text x="349" y="228" text-anchor="middle" class="value">36/50</text>
      <text x="399" y="408" text-anchor="middle" class="value">1</text>
      <text x="359" y="462" text-anchor="middle" class="axis-label">ToM</text>
    </g>
<g>
      <rect x="430" y="170" width="62" height="255" rx="7" fill="#2563eb" opacity="0.82" />
      <rect x="500" y="418" width="22" height="7" rx="5" fill="#dc2626" opacity="0.78" />
      <text x="461" y="160" text-anchor="middle" class="value">49/50</text>
      <text x="511" y="408" text-anchor="middle" class="value">1</text>
      <text x="471" y="462" text-anchor="middle" class="axis-label">ToM+repair</text>
    </g>
<g>
      <rect x="542" y="165" width="62" height="260" rx="7" fill="#2563eb" opacity="0.82" />
      <rect x="612" y="351" width="22" height="74" rx="5" fill="#dc2626" opacity="0.78" />
      <text x="573" y="155" text-anchor="middle" class="value">32/32</text>
      <text x="623" y="341" text-anchor="middle" class="value">10</text>
      <text x="583" y="462" text-anchor="middle" class="axis-label">Revision</text>
    </g>
  <rect x="590" y="135" width="18" height="18" rx="4" fill="#2563eb" opacity="0.82" />
  <text x="616" y="149" class="note">parsed traces</text>
  <rect x="590" y="164" width="18" height="18" rx="4" fill="#dc2626" opacity="0.78" />
  <text x="616" y="178" class="note">hard failures</text>
  <text x="90" y="525" class="note">ToM + repair reaches 49/50 parseable traces; revision is paired on 32 candidate traces.</text>

  <rect x="890" y="115" width="555" height="455" class="box" />
  <text x="925" y="150" class="panel-title">B. Paired verifier revision changes semantic failures</text>

  <g transform="translate(930,205)">
    <rect x="0" y="0" width="145" height="118" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2" />
    <text x="72.5" y="38" text-anchor="middle" class="note">before</text>
    <text x="72.5" y="86" text-anchor="middle" class="big">35</text>
  </g>
  <path d="M1090,264 C1140,234 1182,234 1230,264" class="line" />
  <g transform="translate(1245,205)">
    <rect x="0" y="0" width="145" height="118" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2" />
    <text x="72.5" y="38" text-anchor="middle" class="note">after</text>
    <text x="72.5" y="86" text-anchor="middle" class="big">10</text>
  </g>
  <text x="1167" y="224" text-anchor="middle" class="value">hard failures</text>
  <text x="1167" y="306" text-anchor="middle" class="note">95% bootstrap CI -32 to -18</text>

  <g transform="translate(955,375)">
    <text x="0" y="0" class="axis-label">Hard-failure drop attribution</text>
    <rect x="0" y="24" width="360" height="38" rx="8" fill="#22c55e" opacity="0.82" />
    <text x="374" y="50" class="value">public history 29 to 9</text>
    <rect x="0" y="86" width="90" height="38" rx="8" fill="#0ea5e9" opacity="0.82" />
    <text x="104" y="112" class="value">hidden information 6 to 1</text>
  </g>
  <text x="925" y="525" class="note">McNemar before-only 20, after-only 0, p &lt; 0.001.</text>

  <text x="750" y="618" text-anchor="middle" class="tick">Sources: docs/research/experiments/pilot-metrics-summary/pilot-metrics-summary.json and docs/research/experiments/pilot-verifier-attribution/verifier-attribution.json</text>
</svg>
